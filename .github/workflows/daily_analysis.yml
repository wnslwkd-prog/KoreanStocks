name: Daily Stock Analysis

on:
  schedule:
    # 한국 시간(KST) 평일 오후 4시 30분 실행 (UTC 07:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼 추가
    inputs:
      force_run:
        description: '거래일 여부와 관계없이 강제 실행 (테스트용)'
        type: boolean
        default: false

jobs:
  pre_check:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}

    steps:
      - name: 이중 실행 방지 체크
        id: decide
        run: |
          FORCE_RUN="${{ inputs.force_run || 'false' }}"
          if [ "$FORCE_RUN" == "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "강제 실행 모드 — 이중 실행 체크 건너뜀"
            exit 0
          fi

          TODAY=$(date -u +'%Y-%m-%d')
          CURRENT_RUN_ID=${{ github.run_id }}

          # 오늘(UTC) 동일 워크플로우에서 이미 성공 완료된 실행이 있는지 확인 (현재 실행 제외)
          COMPLETED=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow=daily_analysis.yml \
            --created="$TODAY" \
            --limit=20 \
            --json databaseId,conclusion \
            --jq "[.[] | select(.databaseId != $CURRENT_RUN_ID and .conclusion == \"success\")] | length" \
            2>/dev/null || echo "0")

          if [ "$COMPLETED" -gt "0" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "오늘($TODAY UTC) 이미 성공 완료된 실행 존재 → 이번 실행 건너뜁니다."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "오늘($TODAY UTC) 첫 실행 → 분석 진행합니다."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  analyze:
    needs: pre_check
    if: needs.pre_check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Restore DB from artifacts
        run: gh run download --name stock-database --dir data/storage || echo "No previous DB found, starting fresh"
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - name: Ensure DB directory exists
        run: mkdir -p data/storage

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev # XGBoost 구동을 위한 라이브러리

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dl]"

      - name: Check trading day
        id: check_trading_day
        env:
          FORCE_RUN: ${{ inputs.force_run || 'false' }}
        run: |
          python3 << 'PYEOF'
          import sys, os
          from datetime import datetime

          force_run = os.environ.get('FORCE_RUN', 'false').lower() == 'true'
          if force_run:
              print('강제 실행 모드: 거래일 체크 건너뜀')
              is_trading = True
          else:
              # provider의 is_trading_day() 사용 (exchange_calendars + holidays + pykrx 4단계)
              # pykrx 단독 조회는 휴장일에 이전 거래일 데이터를 반환하는 오동작이 있어 사용 금지
              try:
                  from koreanstocks.core.data.provider import StockDataProvider
                  dp = StockDataProvider()
                  is_trading = dp.is_trading_day()
              except Exception as e:
                  print(f'거래일 확인 실패: {e} → 거래일로 간주하고 실행', file=sys.stderr)
                  is_trading = True  # 실패 시 안전하게 분석 실행

          result = 'true' if is_trading else 'false'
          print(f'오늘({datetime.now().strftime("%Y-%m-%d")}) 거래일 여부: {result}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f'is_trading_day={result}\n')
          PYEOF

      - name: Run daily analysis
        if: steps.check_trading_day.outputs.is_trading_day == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DB_PATH: "data/storage/stock_analysis.db"
        run: koreanstocks recommend

      - name: Save DB as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stock-database
          path: data/storage/stock_analysis.db
          retention-days: 90
          overwrite: true

      - name: Remove watchlist before push (개인 데이터 제거)
        if: steps.check_trading_day.outputs.is_trading_day == 'true'
        run: sqlite3 data/storage/stock_analysis.db "DELETE FROM watchlist;"

- name: Commit updated DB to repository
        if: steps.check_trading_day.outputs.is_trading_day == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          # 1. 'latest-data'라는 이름의 빈 브랜치(Orphan)를 임시로 생성합니다.
          # 이 브랜치는 과거의 어떤 기록도 가지고 있지 않습니다.
          git checkout --orphan latest-data

          # 2. 현재 폴더의 모든 파일 추적을 해제합니다.
          git rm -rf . --cached

          # 3. 사용자님의 DB 파일만 강제로 다시 추가합니다.
          git add -f data/storage/stock_analysis.db

          # 4. '최신 데이터 업데이트'라는 메시지로 커밋을 생성합니다.
          git commit -m "chore: update latest stock DB $(date +'%Y-%m-%d')"

          # 5. 원격 저장소의 'data'라는 브랜치로 '강제 푸시(-f)' 합니다.
          # 이 과정에서 기존의 'data' 브랜치 기록은 사라지고 현재 파일 1개만 남습니다.
          git push -f origin latest-data:db-data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
