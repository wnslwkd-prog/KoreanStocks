name: Daily Stock Analysis

on:
  schedule:
    # 한국 시간(KST) 평일 오후 4시 30분 실행 (UTC 07:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼 추가
    inputs:
      force_run:
        description: '거래일 여부와 관계없이 강제 실행 (테스트용)'
        type: boolean
        default: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restore DB from artifacts
        run: gh run download --name stock-database --dir data/storage || echo "No previous DB found, starting fresh"
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - name: Ensure DB directory exists
        run: mkdir -p data/storage

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev # XGBoost 구동을 위한 라이브러리

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dl]"

      - name: Check trading day
        id: check_trading_day
        env:
          FORCE_RUN: ${{ inputs.force_run || 'false' }}
        run: |
          python3 << 'PYEOF'
          import sys, os
          from datetime import datetime

          force_run = os.environ.get('FORCE_RUN', 'false').lower() == 'true'
          if force_run:
              print('강제 실행 모드: 거래일 체크 건너뜀')
              is_trading = True
          else:
              # provider의 is_trading_day() 사용 (exchange_calendars + holidays + pykrx 4단계)
              # pykrx 단독 조회는 휴장일에 이전 거래일 데이터를 반환하는 오동작이 있어 사용 금지
              try:
                  from koreanstocks.core.data.provider import StockDataProvider
                  dp = StockDataProvider()
                  is_trading = dp.is_trading_day()
              except Exception as e:
                  print(f'거래일 확인 실패: {e} → 거래일로 간주하고 실행', file=sys.stderr)
                  is_trading = True  # 실패 시 안전하게 분석 실행

          result = 'true' if is_trading else 'false'
          print(f'오늘({datetime.now().strftime("%Y-%m-%d")}) 거래일 여부: {result}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f'is_trading_day={result}\n')
          PYEOF

      - name: Notify non-trading day
        if: steps.check_trading_day.outputs.is_trading_day == 'false'
        run: |
          DATE=$(TZ=Asia/Seoul date +'%Y년 %m월 %d일')
          MSG="📅 ${DATE}은 한국 증시 휴장일입니다.%0A오늘은 AI 종목 추천을 건너뜁니다."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run daily analysis
        if: steps.check_trading_day.outputs.is_trading_day == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: "data/storage/stock_analysis.db"
        run: koreanstocks recommend

      - name: Save DB as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-database
          path: data/storage/stock_analysis.db
          retention-days: 90
          overwrite: true

      - name: Remove watchlist before push (개인 데이터 제거)
        if: steps.check_trading_day.outputs.is_trading_day == 'true'
        run: sqlite3 data/storage/stock_analysis.db "DELETE FROM watchlist;"

      - name: Commit updated DB to repository
        if: steps.check_trading_day.outputs.is_trading_day == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add data/storage/stock_analysis.db
          git diff --staged --quiet || git commit -m "chore: daily DB update $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
