e(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default" id="flowchart-A-0" transform="translate(138, 59)"><rect class="basic label-container" style="" x="-130" y="-51" width="260" height="102"/><g class="label" style="" transform="translate(-100, -36)"><rect/><foreignObject width="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Naver 시가총액 순위 페이지<br />탐색 범위: 100 / 200 / 300종목</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-B-1" transform="translate(138, 211)"><rect class="basic label-container" style="" x="-130" y="-51" width="260" height="102"/><g class="label" style="" transform="translate(-100, -36)"><rect/><foreignObject width="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>사전 필터<br />ROE &gt; 0 · 시가총액 500억 이상</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-C-3" transform="translate(138, 411)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"/><g class="label" style="" transform="translate(-100, -84)"><rect/><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>DART Open API<br />ROE 2개년 평균 · 영업이익률<br />영업이익YoY · 부채비율 · 배당수익률<br />※ 연도 폴백: 전년사업보고서 → 반기</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-D-5" transform="translate(138, 647)"><rect class="basic label-container" style="" x="-130" y="-87" width="260" height="174"/><g class="label" style="" transform="translate(-100, -72)"><rect/><foreignObject width="200" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>5단계 필터<br />ROE ≥ roe_min · 영업이익률 ≥ op_margin_min<br />영업이익YoY ≥ yoy_min · 부채비율 ≤ debt_max<br />PBR ≤ pbr_max</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-E-7" transform="translate(138, 859)"><rect class="basic label-container" style="" x="-130" y="-75" width="260" height="150"/><g class="label" style="" transform="translate(-100, -60)"><rect/><foreignObject width="200" height="120"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>quality_score<br />0~100점<br />ROE(30) + 영업이익률(25)<br />영업이익YoY(20) + 부채비율(15) + 배당(10)</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-F-9" transform="translate(138, 1035)"><rect class="basic label-container" style="" x="-104.28125" y="-51" width="208.5625" height="102"/><g class="label" style="" transform="translate(-74.28125, -36)"><rect/><foreignObject width="148.5625" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>ROE 2개년 평균<br />일시적 고ROE 필터링<br />지속 성장 기업 확인</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-G-11" transform="translate(138, 1175)"><rect class="basic label-container" style="" x="-126.5859375" y="-39" width="253.171875" height="78"/><g class="label" style="" transform="translate(-96.5859375, -24)"><rect/><foreignObject width="193.171875" hei