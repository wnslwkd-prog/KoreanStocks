/span></div></foreignObject></g></g><g class="node default" id="flowchart-H-14" transform="translate(293, 1223)"><rect class="basic label-container" style="" x="-130" y="-63" width="260" height="126"/><g class="label" style="" transform="translate(-100, -48)"><rect/><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>결과 반환<br />당일 인메모리 캐시<br />동일 조건 재실행 → 즉시 반환</p></span></div></foreignObject></g></g></g></g></g></svg>